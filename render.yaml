services:
  - type: web
    name: rag-app-backend
    runtime: python
    buildCommand: pip install fastembed fastapi inngest llama-index-core llama-index-readers-file nest-asyncio openai python-dotenv qdrant-client requests uvicorn
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: INNGEST_SIGNING_KEY
        sync: false
      - key: INNGEST_EVENT_KEY
        sync: false
